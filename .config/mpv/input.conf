# Mở menu chính (chuột phải hoặc phím tắt)
MOUSE_BTN2 script-binding uosc/menu
MOUSE_BTN3 script-binding uosc/menu  # Chuột giữa

# Thanh tiến trình
#MOUSE_BTN0 cycle pause                # Click trái: play/pause
MOUSE_BTN0_DBL cycle fullscreen       # Double click: toàn màn hình

##### SEEK #####
RIGHT seek 10
LEFT seek -10
UP seek 60
DOWN seek -60

##### SUBTITLE – POSITION #####
CTRL+DOWN add sub-pos 5
CTRL+UP add sub-pos -5

##### SUBTITLE – SIZE #####
ALT+UP add sub-scale 0.1
ALT+DOWN add sub-scale -0.1

##### SUBTITLE – DELAY #####
, add sub-delay -0.1
. add sub-delay 0.1

##### SUBTITLE – TRACK #####
j cycle sub
J cycle sub down

##### PLAYBACK #####
SPACE cycle pause
ENTER cycle fullscreen
ESC set fullscreen no

####### 🎬 AUTOCROP CONTROLS #######
Ctrl+b script-binding autocrop/toggle              # Bật/tắt autocrop
Ctrl+Shift+b script-binding autocrop/reset         # Reset về mặc định
Ctrl+Alt+b script-binding autocrop/cycle-mode      # Chuyển chế độ

####### 📝 AUTOSUB CONTROLS #######
Ctrl+Shift+s script-binding autosub/sync           # Đồng bộ sub thủ công
Ctrl+Shift+z script-binding autosub/undo           |# Hoàn tác đồng bộ
Ctrl+Shift+a script-binding autosub/toggle         # Bật/tắt tự động
Ctrl+Shift+x script-binding autosub/analyze        # Phân tích lại


####### SKIP INTRO - OUTTRO #########
i script-message skip-intro
o script-message skip-outro

