# Main mpv options
# --- General ---


keep-open=yes
save-position-on-quit=yes
autofit-larger=90%x90%
watch-later-directory=~/.config/mpv/watch_later/


# Thời gian tối thiểu để lưu (giây)
save-position-on-quit-min-duration=60

# Tự động lưu định kỳ (giây)
auto-save-interval=30

# --- UI / UOSC Requirements ---
# UOSC options
script-opts-append=uosc-color=foreground=94e2d5,foreground_text=313244,background=1e1e2e,background_text=cdd6f4,curtain=181825,success=a6e3a1,error=f38ba8

osc=no
osd-bar=no
border=no

# --- Video / Wayland Optimization ---
# We stick to 'gpu' (OpenGL) to ensure instant startup on Intel/VFIO setups.
# 'gpu-next' (Vulkan) can introduce shader compilation lag on some hardware.
vo=gpu-next
deband=yes
interpolation=yes
gpu-context=wayland

### AUDIO ###
audio-channels=auto
audio-nomalize-downmix=yes
volume=100
volumemax=200

# --- Hardware Decoding (Auto-Generated) ---
hwdec=vaapi
vaapi-device=/dev/dri/renderD128

# --- Quality ---
scale=spline36
cscale=spline36
dscale=mitchell
correct-downscaling=yes
linear-downscaling=yes
dither-depth=auto

### SUBTITLE ###
sub-auto=fuzzy
sub-file-paths=subs:subtitles:Subs:**
sub-font="Source Han Sans JP"
sub-font-size=38
sub-border-size=1.5
sub-shadow-offset=0.5

# Stats script options
# Options are on separate lines for clarity
# Colors are in #BBGGRR format
script-opts-append=stats-border_color=251818
script-opts-append=stats-font_color=f4d6cd
script-opts-append=stats-plot_bg_border_color=d5e294
script-opts-append=stats-plot_bg_color=251818
script-opts-append=stats-plot_color=d5e294

# Profile chuyên dụng cho autocrop
[autocrop-optimized]
profile-desc=cond:not get("duration", 0) or get("duration", 0) > 300
# Giảm deinterlacing để crop chính xác hơn
deinterlace=no
pullup=no
# Tối ưu hóa video decoding
vd-lavc-fast=yes
vd-lavc-skiploopfilter=all
# Giữ thông tin aspect ratio gốc
keepaspect=yes
video-aspect-override=no
# Tối ưu cho phân tích frame
hr-seek=yes
hr-seek-framedrop=no

# Profile cho phim có sub cần sync
[autosub-optimized]
profile-desc=cond:get_track_list("sub") and get_track_list("sub")[1]
# Tăng độ chính xác timing
audio-client-name=mpv-high-precision
initial-audio-sync=yes
# Sub rendering chất lượng cao
sub-ass=yes
sub-ass-override=yes
sub-ass-force-style=PlayResX=1920,PlayResY=1080
# Font tốt cho sub
sub-font="Noto Sans CJK SC"
sub-font-size=40
sub-border-size=2.5
sub-shadow-offset=1.2
sub-shadow-color="#00000080"

[smart-crop]
profile-desc=cond:get("width", 0) and get("height", 0) and get("width")/get("height") < 1.7
script-opts=autocrop-enabled=yes,autocrop-threshold=0.01

[anime-with-subs]
profile-desc=cond:string.match(filename:lower(), "%.mkv$") and get_track_list("sub")
script-opts=autosub-enabled=yes,autosub-confidence=0.8
sub-font-size=36

# --- Screenshots ---
screenshot-format=png
screenshot-directory=~/Pictures/Screenshots

# --- Thumbfast Worker Profile ---
[thumbfast]
network=no
audio=no
sub=no
video=no
hwdec=no 
profile=fast
