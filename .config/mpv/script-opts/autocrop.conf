# AUTOCROP CONFIG - Tối ưu hóa
enabled=yes
threshold=0.015              # Ngưỡng phát hiện (1.5%)
margin=0.005                 # Lề an toàn
max_crop=0.18                # Crop tối đa 18%
analyze_frames=8             # Phân tích 8 frame
min_duration=10              # Chỉ crop video >10 giây
preserve_aspect=yes          # Giữ tỷ lệ
auto_apply=yes               |# Tự động áp dụng
show_osd=yes                 # Hiển thị thông báo
key_toggle=Ctrl+b            # Phím bật/tắt
key_reset=Ctrl+Shift+b       # Phím reset
key_cycle=Ctrl+Alt+b         # Phím chuyển chế độ
debug=no                     # Tắt debug
