# AUTOSUB CONFIG - Tối ưu hóa
enabled=yes
auto_sync=yes                # Tự động sync khi load
confidence=0.75              # Độ tin cậy 75%
min_length=0.8              # Sub dài ít nhất 0.8s
max_shift=3.0               # Điều chỉnh tối đa ±3s
samples=5                   # Lấy mẫu 5 vị trí
method=dynamic              # Phương pháp dynamic
visual_feedback=yes         # Hiển thị feedback
backup_original=yes         # Backup sub gốc
key_sync=Ctrl+Shift+s       # Sync thủ công
key_undo=Ctrl+Shift+z       # Hoàn tác
key_toggle=Ctrl+Shift+a     # Bật/tắt tự động
osd_duration=3              # Hiện OSD 3 giây
