### MÀU SẮC CATPPUCCIN MOCHA ###
# Màu chủ đạo
foreground = #cdd6f4    # Text color
background = #1e1e2e    # Base background
accent = #94e2d5        # Teal accent (có thể đổi thành #cba6f7 cho màu mauve)

# Menu và controls
menu_item_height = 28
menu_font_size = 12
menu_font_scale = 1.0
controls_size = 36
timeline_size = 36

# Thanh tiến trình
timeline_style = bar
timeline_line_width = 2
timeline_border_size = 0

# Hiệu ứng
animation_duration = 0.15
shadow_size = 0
blur = no

# Trạng thái buffering
buffered_amount_color = #313244
cache_amount_color = #45475a

### HÀNH VI ###
autohide = always        # always: luôn ẩn, paused: ẩn khi pause
autohide_delay = 1000    # 1 giây
volume = bar             # bar: thanh volume, wheel: vòng xoay
volume_step = 2

# Menu chính
menu_items = `
  file::Open file::script-binding uosc/open-file
  --
  playback::Play/Pause::cycle pause
  playback::Stop::stop
  --
  audio::Audio tracks::script-binding uosc/audio
  audio::Subtitles::script-binding uosc/subtitles
  --
  video::Video tracks::script-binding uosc/video
  video::Playlist::script-binding uosc/playlist
  --
  chapters::Chapters::script-binding uosc/chapters
  --
  window::Toggle fullscreen::cycle fullscreen
  window::Toggle on-top::cycle ontop
  --
  settings::uOSC settings::script-binding uosc/settings
`
