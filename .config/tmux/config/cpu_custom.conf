#!/usr/bin/env bash

%hidden MODULE_NAME="cpu_custom"

set -g "@cpu_low_bg_color" "#a5d4a7"
set -g "@cpu_medium_bg_color" "#faec94"
set -g "@cpu_high_bg_color" "#d6a8a6"

set -ogq "@catppuccin_${MODULE_NAME}_icon" "󰍛 "
set -ogq "@catppuccin_${MODULE_NAME}_color" "#{l:#{cpu_bg_color}}"
set -ogq "@catppuccin_${MODULE_NAME}_text" " #{l:#{cpu_percentage}}"

source -F "#{TMUX_ROOT}/plugins/tmux/utils/status_module.conf"
