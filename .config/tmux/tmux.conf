#!/usr/bin/env bash

# ‚ĖĎ‚ĖÄ‚Ėą‚ĖÄ‚ĖĎ‚Ėą‚ĖĄ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ
# ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖĎ
# ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ
#
# Terminal multiplexer
# https://github.com/tmux/tmux

# --------------------------------------------- #
# -------------- Tmux TPM Install ------------- #
# --------------------------------------------- #

set-environment -gF TMUX_ROOT '#{HOME}/.config/tmux/'

if 'test ! -d "${TMUX_ROOT}/plugins/tpm"' {
  run 'mkdir -p "${TMUX_ROOT}/plugins"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_ROOT}/plugins/tpm"'
  run '${TMUX_ROOT}/plugins/tpm/bin/install_plugins'
}

# --------------------------------------------- #
# --------------- Tmux Settings --------------- #
# --------------------------------------------- #

set-option -g display-time 3000
set-option -g focus-events on

set -g default-shell "/usr/bin/fish"
set -g default-shell "/usr/bin/fish"

# True Color Config
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# General Config
set -gq allow-passthrough on
set -g base-index 1           # start indexing windows at 1
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g escape-time 0          # zero-out escape time delay
set -g history-limit 50000    # increase history size
set -g mode-keys vi           # enable vi mode
set -g mouse on               # enable mouse support
set -g pane-base-index 1      # start indexing pane at 1
set -g renumber-windows on    # renumber all windows when any window is closed
set -g set-clipboard on       # use system clipboard
set -g status on              # enable status bar
set -g status-interval 5      # update the status bar every 5 seconds
set -g status-position bottom # show bar at the bottom

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g default-terminal "${TERM}"

# --------------------------------------------- #
# --------------- Tmux Bindings --------------- #
# --------------------------------------------- #

# Unbinding keys
unbind C-b
unbind '"'
unbind %
unbind c
unbind d
unbind n
unbind p
unbind t

# Enabling mouse and allowing it to select pane
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# Remap the prefix B to A
set -g prefix C-a
bind C-a send-prefix

# Remap keybindings to split panes
bind -N "Split pane horizontally" \\ split-window -h -c "#{pane_current_path}"
bind -N "Split pane vertically" - split-window -v -c "#{pane_current_path}"

# Add keybinding to reload .tmux file
bind -N "Reload config"  r source-file ~/.config/tmux/tmux.conf \; display ' ůįöį Reloaded...'

## Create bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

## Enable copy to system's clipboard
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Remap clock mode
bind -N "Show clock mode" T clock-mode

# Switch between windows
bind -N "Select previous window" -r M-h select-window -t :-
bind -N "Select next window" -r M-l select-window -t :+

# Remap keybindings to new window
bind -N "New window" n new-window -c '#{pane_current_path}'
bind-key -N "Kill pane or window" x kill-pane

# Rezise panels
bind -N "Resize panel to left" -r H resize-pane -L 5
bind -N "Resize panel to down" -r J resize-pane -D 5
bind -N "Resize panel to up" -r K resize-pane -U 5
bind -N "Resize panel to right" -r L resize-pane -R 5

# Sesh Mananger
bind -N "Command: sesh connect fzf" k run-shell "sesh connect \"$(
  sesh list -i --hide-duplicates | fzf $FZF_DEFAULT_OPTS \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list -i)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(  )+reload(sesh list -i)' \
    --bind 'ctrl-f:change-prompt( )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-g:change-prompt(ůįíď )+reload(sesh list -i -c)' \
    --bind 'ctrl-t:change-prompt( )+reload(sesh list -i -t)' \
    --bind 'ctrl-x:change-prompt(ůįČč )+reload(sesh list -i -z)' \
    --border-label '  Sesh ' \
    --header 'ůįÖć Press: ^a all - ^t tmux - ^g configs - ^x zoxide - ^d kill - ^f find \n\n' \
    --no-sort |
    choose -f ' ' 1
)\""

# Open AI Tools
bind -N "Command: ai tools" a new-window -c "#{pane_current_path}" -n "ůįö© AI Tools" "ai_tools"

# Command by Apps
bind -N "Command: btop " b new-window -c "#{pane_current_path}" -n " btop" "btop 2> /dev/null"
bind -N "Command: bottom " B new-window -c "#{pane_current_path}" -n " bottom" "btm 2> /dev/null"
bind -N "Command: dooit " D new-window -c "#{pane_current_path}" -n "ůįĄĻ dooit" "dooit"
bind -N "Command: lazydocker " d new-window -c "#{pane_current_path}" -n "ůį°® lazydocker" "lazydocker #{pane_current_path}"
bind -N "Command: lazygit " g new-window -c "#{pane_current_path}" -n "ůįäĘ lazygit" "lazygit #{pane_current_path}"
bind -N "Command: gh-dash " G new-window -c "#{pane_current_path}" -n " gh-dash" "gh dash"
bind -N "Command: tig " t new-window -c "#{pane_current_path}" -n "ůįäĘ tig" "tig #{pane_current_path}"
bind -N "Command: yazi " y new-window -c "#{pane_current_path}" -n "ůįá• yazi" "yazi"

# Command by Functions
bind -N "Command: tmux-toggle-bar" A run-shell "tmux_toggle_bar"
bind -N "Command: tmux-toggle-position" S run-shell "tmux_toggle_position"

# --------------------------------------------- #
# -------------- Plugins Config --------------- #
# --------------------------------------------- #

# FZF URL Config
set -g @fzf-url-fzf-options '-p 50%,30% --border-label="   Open URL " --padding=0'
set -g @fzf-url-history-limit "2000"

# Thumbs Config
set -g @thumbs-command "echo -n {} | xclip -sel clip"
set -g @thumbs-key "c"

# Tmux menus
set -g @menus_trigger "+"

#Nerd Font Config
set -g @tmux-nerd-font-window-name-shell-icon ' '
set -g @tmux-nerd-font-window-name-show-name true

# Tmux Floax
set -g @floax-bind "p"
set -g @floax-height "80%"
set -g @floax-width  "80%"
set -g @floax-text-color "#dadfe1"
set -g @floax-border-color "#ca9ee6"

# Catppuccin Config
set -g @catppuccin_flavor "frappe"

set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_current_number_color "#8caaee"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number_color "#babbf1"
set -g @catppuccin_window_text " #W"

set -g @catppuccin_status_left_separator "‚Ėą"
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator "#[fg=#{@thm_surface_0}]‚Ėą"

set -g @catppuccin_pane_left_separator ""
set -g @catppuccin_pane_middle_separator ""
set -g @catppuccin_pane_right_separator ""

set -g @catppuccin_host_color "#ca9ee6"
set -g @catppuccin_session_color "#eebebe"

run "#{TMUX_ROOT}/plugins/tmux/catppuccin.tmux"

source -F "#{TMUX_ROOT}/config/cpu_custom.conf"
source -F "#{TMUX_ROOT}/config/dir_name.conf"
source -F "#{TMUX_ROOT}/config/indicator.conf"
source -F "#{TMUX_ROOT}/config/memory.conf"

set -g status-right-length 200
set -g status-left ""
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_dir_name}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu_custom}"
set -agF status-right "#{E:@catppuccin_status_memory}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_indicator}"

# --------------------------------------------- #
# ---------------- Tmux Plugin ---------------- #
# --------------------------------------------- #

set -g @plugin 'catppuccin/tmux'                        # Tmux theme
set -g @plugin 'christoomey/vim-tmux-navigator'         # <ctrl>+hjkl
set -g @plugin 'fcsonline/tmux-thumbs'                  # <cmd|shift>+c
set -g @plugin 'joshmedeski/tmux-fzf-url'               # Bind key u
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name' # Icons in panel name
set -g @plugin 'tmux-plugins/tmux-cpu'                  # Show Hardwares Status
set -g @plugin 'jaclu/tmux-menus'                       # Contextmenu
set -g @plugin 'alexwforsythe/tmux-which-key'           # Show keybindings
set -g @plugin 'omerxx/tmux-floax'                      # Float term
set -g @plugin 'tmux-plugins/tpm'

# --------------------------------------------- #
# -------------- Tmux Bootstrap --------------- #
# --------------------------------------------- #

# Init TPM
run '#{TMUX_ROOT}/plugins/tpm/tpm'

# --------------------------------------------- #
# --------------- Reset Defaults -------------- #
# --------------------------------------------- #

set -g popup-style "bg=default"
set -g popup-border-style "bg=default"
